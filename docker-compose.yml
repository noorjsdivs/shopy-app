services:
  db:
    image: postgres:16
    container_name: shopy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shopy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopy}
      POSTGRES_DB: ${POSTGRES_DB:-shopy}
    ports:
      # Host port is configurable to avoid clashing with a local Postgres on 5432.
      - "${DB_PORT:-5433}:5432"
    volumes:
      - shopy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopy -d shopy"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  shopy_pgdata:
